name: flutter_vibe_coder
description: A minimal Flutter project to use with Copilot SKILL.md
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  image_path: assets/images/wsbills_icon.png
  android: true
  ios: false
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: true
    image_path: assets/images/wsbills_icon.png
    icon_size: 48
  macos:
    generate: false
